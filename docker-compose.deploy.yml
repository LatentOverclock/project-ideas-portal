services:
  backend:
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge-proxy"
      - "traefik.http.routers.project-ideas-api.rule=Host(`${APP_HOST}`) && (PathPrefix(`/graphql`) || PathPrefix(`/health`))"
      - "traefik.http.routers.project-ideas-api.entrypoints=websecure"
      - "traefik.http.routers.project-ideas-api.priority=200"
      - "traefik.http.routers.project-ideas-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.project-ideas-api.loadbalancer.server.port=8080"
    networks:
      - default
      - edge-proxy

  frontend:
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge-proxy"
      - "traefik.http.routers.project-ideas.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.project-ideas.entrypoints=websecure"
      - "traefik.http.routers.project-ideas.priority=100"
      - "traefik.http.routers.project-ideas.tls.certresolver=letsencrypt"
      - "traefik.http.services.project-ideas.loadbalancer.server.port=80"
    networks:
      - default
      - edge-proxy

networks:
  edge-proxy:
    external: true
